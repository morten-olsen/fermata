plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.nowplaying'
version = '1.0.0'

android {
  namespace "expo.modules.nowplaying"
  defaultConfig {
    versionCode 1
    versionName "1.0.0"
  }
}

repositories {
  mavenCentral()
}

dependencies {
  implementation 'androidx.core:core-ktx:1.15.0'
  def androidxMedia3Version = "1.8.0"
  implementation "androidx.media3:media3-session:$androidxMedia3Version"
  implementation "androidx.media3:media3-exoplayer:$androidxMedia3Version"
}
